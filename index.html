<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Music Player</title>
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI Music" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --accent: #e8ff00;
      --accent2: #ff3c6e;
      --text: #f0f0f0;
      --muted: #555;
      --border: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background glow effects */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,255,0,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,60,110,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      padding: 48px 24px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .logo span {
      color: var(--accent2);
    }

    .settings-btn {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .settings-btn:hover { border-color: var(--accent); }
    .settings-btn svg { width: 16px; height: 16px; stroke: var(--muted); }

    /* SETUP PANEL */
    .setup-panel {
      margin: 0 24px;
      padding: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: slideDown 0.3s ease;
    }
    .setup-panel.open { display: flex; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .setup-panel label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .setup-panel input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .setup-panel input:focus { border-color: var(--accent); }
    .setup-panel input::placeholder { color: var(--muted); }

    .load-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-btn:hover { background: #fff; }
    .load-btn:active { transform: scale(0.98); }

    /* NOW PLAYING */
    .now-playing {
      margin: 24px 24px 0;
      padding: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
    }

    .now-playing::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,255,0,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .track-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface2);
      position: relative;
      margin-bottom: 20px;
    }

    .track-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .track-thumb .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111, #1a1a1a);
    }

    .track-thumb .thumb-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.2;
    }

    .playing-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      letter-spacing: 1.5px;
      font-family: 'Bebas Neue', sans-serif;
      padding: 4px 10px;
      border-radius: 20px;
      display: none;
    }
    .playing-indicator.visible { display: block; }

    .track-info {
      margin-bottom: 20px;
    }

    .track-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-channel {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* PROGRESS */
    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }

    /* CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover { background: var(--surface2); }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg { width: 20px; height: 20px; stroke: var(--muted); fill: none; }

    .play-btn {
      width: 60px;
      height: 60px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 0 30px rgba(232,255,0,0.2);
    }
    .play-btn:hover { background: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 22px; height: 22px; fill: #000; stroke: none; }

    .ctrl-active svg { stroke: var(--accent) !important; }

    /* PLAYLIST */
    .playlist-header {
      padding: 28px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .playlist-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .track-count {
      font-size: 12px;
      color: var(--muted);
    }

    .playlist {
      padding: 0 24px 120px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .track-item:hover { background: var(--surface); }
    .track-item.active {
      background: var(--surface);
      border-color: rgba(232,255,0,0.15);
    }

    .track-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--muted);
      min-width: 24px;
      text-align: center;
    }
    .track-item.active .track-num { color: var(--accent); }

    .track-item-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .track-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .track-item-info {
      flex: 1;
      overflow: hidden;
    }

    .track-item-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .track-item.active .track-item-title { color: var(--accent); }

    .track-item-duration {
      font-size: 11px;
      color: var(--muted);
    }

    /* LOADING / EMPTY STATES */
    .state-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .state-msg .icon { font-size: 48px; margin-bottom: 16px; }
    .state-msg p { font-size: 14px; line-height: 1.6; }
    .state-msg strong { color: var(--text); }

    .loader {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .loader span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 0.6s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.1s; }
    .loader span:nth-child(3) { animation-delay: 0.2s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* HIDDEN YT PLAYER */
    #yt-player { position: fixed; bottom: -9999px; left: -9999px; width: 1px; height: 1px; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ERROR */
    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent2);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .error-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">AI<span>.</span>MUSIC</div>
    <div class="settings-btn" onclick="toggleSetup()">
      <svg viewBox="0 0 24 24" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </header>

  <!-- SETUP PANEL -->
  <div class="setup-panel" id="setupPanel">
    <div>
      <label>YouTube API Key</label>
      <input type="password" id="apiKey" placeholder="AIza..." />
    </div>
    <div>
      <label>Kanal-ID oder URL</label>
      <input type="text" id="channelId" placeholder="UCxxxxxxxx oder youtube.com/@kanal" />
    </div>
    <button class="load-btn" onclick="loadChannel()">LADEN</button>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing" id="nowPlaying">
    <div class="track-thumb">
      <div class="thumb-placeholder" id="thumbPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <img id="trackThumb" src="" style="display:none" />
      <div class="playing-indicator" id="playingIndicator">● LIVE</div>
    </div>

    <div class="track-info">
      <div class="track-title" id="trackTitle">Kein Track geladen</div>
      <div class="track-channel" id="trackChannel">Kanal konfigurieren →</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Zurück">
        <svg viewBox="0 0 24 24" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Weiter">
        <svg viewBox="0 0 24 24" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Wiederholen">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-header">
    <div class="playlist-title">PLAYLIST</div>
    <div class="track-count" id="trackCount"></div>
  </div>

  <div class="playlist" id="playlist">
    <div class="state-msg">
      <div class="icon">🎵</div>
      <p>Klick oben auf <strong>⚙</strong><br>API Key & Kanal eingeben<br>und Musik laden.</p>
    </div>
  </div>
</div>

<!-- YouTube Player -->
<div id="yt-player"></div>
<div class="error-toast" id="errorToast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let player = null;
  let tracks = [];
  let currentIndex = 0;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat = false;
  let progressInterval = null;
  let playerReady = false;

  // Load saved config
  const saved = JSON.parse(localStorage.getItem('aimusic_cfg') || '{}');
  if (saved.apiKey) document.getElementById('apiKey').value = saved.apiKey;
  if (saved.channelId) document.getElementById('channelId').value = saved.channelId;

  function toggleSetup() {
    document.getElementById('setupPanel').classList.toggle('open');
  }

  function showError(msg) {
    const t = document.getElementById('errorToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // YouTube IFrame API ready
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height: '1',
      width: '1',
      playerVars: { autoplay: 0, controls: 0, rel: 0 },
      events: {
        onReady: () => { playerReady = true; },
        onStateChange: onPlayerStateChange,
        onError: (e) => showError('Video konnte nicht geladen werden (' + e.data + ')')
      }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      isPlaying = true;
      updatePlayIcon();
      document.getElementById('playingIndicator').classList.add('visible');
      startProgressUpdate();
    } else if (event.data === YT.PlayerState.PAUSED) {
      isPlaying = false;
      updatePlayIcon();
      document.getElementById('playingIndicator').classList.remove('visible');
      stopProgressUpdate();
    } else if (event.data === YT.PlayerState.ENDED) {
      document.getElementById('playingIndicator').classList.remove('visible');
      if (isRepeat) {
        player.seekTo(0);
        player.playVideo();
      } else {
        nextTrack();
      }
    }
  }

  async function loadChannel() {
    const apiKey = document.getElementById('apiKey').value.trim();
    let channelInput = document.getElementById('channelId').value.trim();

    if (!apiKey || !channelInput) { showError('Bitte API Key und Kanal eingeben'); return; }

    // Save config
    localStorage.setItem('aimusic_cfg', JSON.stringify({ apiKey, channelId: channelInput }));

    // Extract channel ID from URL if needed
    let channelId = channelInput;
    if (channelInput.includes('youtube.com/@')) {
      const handle = channelInput.split('@')[1].split('/')[0];
      channelId = await resolveHandle(handle, apiKey);
      if (!channelId) return;
    } else if (channelInput.includes('youtube.com/channel/')) {
      channelId = channelInput.split('/channel/')[1].split('/')[0];
    }

    document.getElementById('playlist').innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
    document.getElementById('setupPanel').classList.remove('open');

    await fetchVideos(channelId, apiKey);
  }

  async function resolveHandle(handle, apiKey) {
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${apiKey}`);
      const data = await res.json();
      if (data.items && data.items.length > 0) return data.items[0].id;
      showError('Kanal nicht gefunden');
      return null;
    } catch { showError('Fehler beim Laden des Kanals'); return null; }
  }

  async function fetchVideos(channelId, apiKey, pageToken = '', allItems = []) {
    try {
      // Get uploads playlist ID
      if (allItems.length === 0) {
        const chanRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${apiKey}`);
        const chanData = await chanRes.json();
        if (!chanData.items || chanData.items.length === 0) { showError('Kanal nicht gefunden'); return; }
        const uploadsId = chanData.items[0].contentDetails.relatedPlaylists.uploads;
        await fetchPlaylistItems(uploadsId, apiKey, '', []);
      }
    } catch (e) { showError('API Fehler: ' + e.message); }
  }

  async function fetchPlaylistItems(playlistId, apiKey, pageToken = '', allItems = []) {
    try {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.error) { showError('API Fehler: ' + data.error.message); return; }

      const items = [...allItems, ...(data.items || [])];

      if (data.nextPageToken && items.length < 200) {
        await fetchPlaylistItems(playlistId, apiKey, data.nextPageToken, items);
      } else {
        processVideos(items);
      }
    } catch (e) { showError('Ladefehler: ' + e.message); }
  }

  function processVideos(items) {
    tracks = items
      .filter(i => i.snippet.resourceId && i.snippet.resourceId.videoId)
      .map(i => ({
        id: i.snippet.resourceId.videoId,
        title: i.snippet.title,
        channel: i.snippet.channelTitle,
        thumb: i.snippet.thumbnails?.medium?.url || i.snippet.thumbnails?.default?.url || ''
      }));

    if (tracks.length === 0) { showError('Keine Videos gefunden'); return; }

    document.getElementById('trackCount').textContent = tracks.length + ' Tracks';
    renderPlaylist();

    // Auto-load first
    loadTrack(0);
  }

  function renderPlaylist() {
    const pl = document.getElementById('playlist');
    pl.innerHTML = tracks.map((t, i) => `
      <div class="track-item ${i === currentIndex ? 'active' : ''}" onclick="loadTrack(${i})" id="track-${i}">
        <div class="track-num">${i === currentIndex ? '▶' : i + 1}</div>
        <div class="track-item-thumb">
          ${t.thumb ? `<img src="${t.thumb}" loading="lazy" />` : ''}
        </div>
        <div class="track-item-info">
          <div class="track-item-title">${t.title}</div>
          <div class="track-item-duration">${t.channel}</div>
        </div>
      </div>
    `).join('');
  }

  function loadTrack(index) {
    if (!tracks.length || !playerReady) return;

    // Update active states
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
      el.querySelector('.track-num').textContent = i === index ? '▶' : i + 1;
    });

    currentIndex = index;
    const track = tracks[index];

    // Update now playing UI
    document.getElementById('trackTitle').textContent = track.title;
    document.getElementById('trackChannel').textContent = track.channel;

    if (track.thumb) {
      document.getElementById('trackThumb').src = track.thumb;
      document.getElementById('trackThumb').style.display = 'block';
      document.getElementById('thumbPlaceholder').style.display = 'none';
    } else {
      document.getElementById('trackThumb').style.display = 'none';
      document.getElementById('thumbPlaceholder').style.display = 'flex';
    }

    // Load & play
    player.loadVideoById(track.id);
    isPlaying = true;
    updatePlayIcon();

    // Scroll track into view
    setTimeout(() => {
      const el = document.getElementById('track-' + index);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }

  function togglePlay() {
    if (!playerReady || !tracks.length) { toggleSetup(); return; }
    if (isPlaying) { player.pauseVideo(); }
    else { player.playVideo(); }
  }

  function nextTrack() {
    if (!tracks.length) return;
    let next;
    if (isShuffle) {
      next = Math.floor(Math.random() * tracks.length);
    } else {
      next = (currentIndex + 1) % tracks.length;
    }
    loadTrack(next);
  }

  function prevTrack() {
    if (!tracks.length) return;
    const prev = (currentIndex - 1 + tracks.length) % tracks.length;
    loadTrack(prev);
  }

  function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffleBtn').classList.toggle('ctrl-active', isShuffle);
  }

  function toggleRepeat() {
    isRepeat = !isRepeat;
    document.getElementById('repeatBtn').classList.toggle('ctrl-active', isRepeat);
  }

  function updatePlayIcon() {
    const svg = document.getElementById('playIcon');
    if (isPlaying) {
      svg.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    } else {
      svg.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    }
  }

  function startProgressUpdate() {
    stopProgressUpdate();
    progressInterval = setInterval(() => {
      if (!player || !playerReady) return;
      const current = player.getCurrentTime() || 0;
      const duration = player.getDuration() || 0;
      if (duration > 0) {
        document.getElementById('progressFill').style.width = (current / duration * 100) + '%';
        document.getElementById('timeElapsed').textContent = formatTime(current);
        document.getElementById('timeDuration').textContent = formatTime(duration);
      }
    }, 500);
  }

  function stopProgressUpdate() {
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }

  function seekTo(e) {
    if (!playerReady || !tracks.length) return;
    const bar = e.currentTarget;
    const pct = e.offsetX / bar.offsetWidth;
    const duration = player.getDuration() || 0;
    player.seekTo(pct * duration, true);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') nextTrack();
    if (e.code === 'ArrowLeft') prevTrack();
  });

  // Auto-load if config saved
  if (saved.apiKey && saved.channelId) {
    setTimeout(() => {
      document.getElementById('setupPanel').classList.add('open');
    }, 500);
  } else {
    setTimeout(() => toggleSetup(), 300);
  }
</script>

</body>
</html>
