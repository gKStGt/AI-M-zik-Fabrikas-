<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aİ MÜZİK FABRİKASI</title>
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aİ MÜZİK" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080808; --surface: #111111; --surface2: #1a1a1a;
      --accent: #e8ff00; --accent2: #ff3c6e; --text: #f0f0f0;
      --muted: #808080; --border: #3a3a3a;
    }
    :root.light {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #ebebeb;
      --accent: #c8d400;
      --accent2: #ff3c6e;
      --text: #111111;
      --muted: #999;
      --border: #ddd;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; transition: background 0.25s, border-color 0.25s, color 0.25s; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; position:relative; }
    body::before { content:''; position:fixed; top:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(232,255,0,0.04) 0%,transparent 70%); pointer-events:none; z-index:0; }
    body::after { content:''; position:fixed; bottom:-200px; right:-200px; width:500px; height:500px; background:radial-gradient(circle,rgba(255,60,110,0.05) 0%,transparent 70%); pointer-events:none; z-index:0; }

    /* Turkish flag watermark */
    .tr-flag-bg {
      position: fixed;
      bottom: -60px;
      right: -60px;
      width: 320px;
      height: 320px;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
    }
    .tr-flag-bg svg {
      width: 100%;
      height: 100%;
      -webkit-mask-image: radial-gradient(circle at 70% 70%, black 10%, transparent 70%);
      mask-image: radial-gradient(circle at 70% 70%, black 10%, transparent 70%);
    }
    .app { max-width:420px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; z-index:1; }

    /* HEADER */
    header { padding:36px 20px 20px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .app-logo-img { width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--accent2); }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--accent); line-height:1; }
    .logo span { color:var(--accent2); }
    .header-right { display:flex; gap:8px; align-items:center; }

    /* ICON BUTTONS */
    .icon-btn { width:36px; height:36px; background:var(--surface); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .icon-btn:hover { border-color:var(--accent); }
    .icon-btn svg { width:15px; height:15px; stroke:var(--text); fill:none; stroke-width:2; }

    /* LANG DROPDOWN */
    .lang-wrap { position:relative; }
    .lang-btn { width:auto; padding:0 10px; border-radius:20px; gap:5px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text); white-space:nowrap; background:var(--surface); border:1px solid var(--border); height:36px; display:flex; align-items:center; cursor:pointer; }
    .lang-btn:hover { border-color:var(--accent); }
    .lang-dropdown { position:absolute; top:44px; right:0; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; z-index:100; display:none; min-width:140px; box-shadow:0 8px 30px rgba(0,0,0,0.3); }
    .lang-dropdown.open { display:block; }
    .lang-option { padding:11px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; font-size:13px; transition:background 0.15s; }
    .lang-option:hover { background:var(--surface2); }
    .lang-option.active { color:var(--accent); }
    .flag { font-size:11px; font-weight:700; letter-spacing:0.5px; padding:2px 5px; border-radius:4px; background:var(--surface2); color:var(--text); }

    .install-btn { display:none; margin:12px 20px 0; padding:14px; background:var(--accent); color:#000; border:none; border-radius:14px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; cursor:pointer; width:calc(100% - 40px); text-align:center; }
    .install-btn:hover { background:var(--text); color:var(--bg); }
    .install-btn.visible { display:block; }
    .setup-panel { margin:0 20px; padding:24px; background:var(--surface); border:1px solid var(--border); border-radius:20px; display:none; flex-direction:column; gap:14px; animation:slideDown 0.3s ease; transition: transform 0.2s, box-shadow 0.2s; }
    .setup-panel:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .setup-panel.open { display:flex; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    .setup-panel label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; display:block; }
    .setup-panel input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
    .setup-panel input:focus { border-color:var(--accent); }
    .setup-panel input::placeholder { color:var(--muted); }
    .load-btn { background:var(--accent); color:#000; border:none; border-radius:10px; padding:13px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; cursor:pointer; }
    .load-btn:hover { background:var(--text); color:var(--bg); }
    .load-btn:active { transform:scale(0.98); }

    /* NOW PLAYING */
    .now-playing { margin:20px 20px 0; padding:24px; background:var(--surface); border:1px solid var(--border); border-radius:24px; position:relative; overflow:hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .now-playing:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .now-playing::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(232,255,0,0.03) 0%,transparent 60%); pointer-events:none; }
    .track-thumb { width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; background:var(--surface2); position:relative; margin-bottom:18px; }
    .track-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .track-thumb .thumb-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--surface),var(--surface2)); }
    .track-thumb .thumb-placeholder svg { width:48px; height:48px; opacity:0.25; }
    .playing-indicator { position:absolute; top:10px; right:10px; background:var(--accent2); color:#fff; font-size:10px; letter-spacing:1.5px; font-family:'Bebas Neue',sans-serif; padding:4px 10px; border-radius:20px; display:none; }
    .playing-indicator.visible { display:block; }
    .track-info { margin-bottom:18px; }
    .track-title { font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:1px; line-height:1.2; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track-channel { font-size:12px; color:var(--muted); }
    .progress-wrap { margin-bottom:18px; }
    .progress-bar { width:100%; height:3px; background:var(--border); border-radius:10px; cursor:pointer; margin-bottom:7px; }
    .progress-fill { height:100%; background:var(--accent); border-radius:10px; width:0%; transition:width 0.5s linear; }
    .progress-times { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
    .controls { display:flex; align-items:center; justify-content:space-between; }
    .ctrl-btn { background:none; border:none; cursor:pointer; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .ctrl-btn:hover { background:var(--surface2); }
    .ctrl-btn:active { transform:scale(0.9); }
    .ctrl-btn svg { width:20px; height:20px; stroke:var(--text); fill:none; stroke-width:2; }
    .play-btn { width:58px; height:58px; background:var(--accent); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 30px rgba(232,255,0,0.2); }
    .play-btn:hover { background:var(--text); }
    .play-btn:active { transform:scale(0.94); }
    .play-btn svg { width:22px; height:22px; fill:#000; stroke:none; }
    .ctrl-active svg { stroke:var(--accent) !important; }

    /* PLAYLIST */
    .playlist-header { padding:24px 20px 10px; display:flex; align-items:center; justify-content:space-between; }
    .playlist-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--muted); }
    .track-count { font-size:12px; color:var(--muted); }
    .playlist { padding:0 20px 120px; display:flex; flex-direction:column; gap:4px; }
    .track-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:14px; cursor:pointer; border:1px solid transparent; transition: background 0.15s, transform 0.15s, box-shadow 0.15s; }
    .track-item:hover { background:var(--surface); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
    .track-item.active { background:var(--surface); border-color:rgba(232,255,0,0.15); }
    .track-num { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--muted); min-width:22px; text-align:center; }
    .track-item.active .track-num { color:var(--accent); }
    .track-item-thumb { width:46px; height:46px; border-radius:8px; overflow:hidden; background:var(--surface2); flex-shrink:0; }
    .track-item-thumb img { width:100%; height:100%; object-fit:cover; }
    .track-item-info { flex:1; overflow:hidden; }
    .track-item-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .track-item.active .track-item-title { color:var(--accent); }
    .track-item-duration { font-size:11px; color:var(--muted); }
    .state-msg { text-align:center; padding:50px 20px; color:var(--muted); }
    .state-msg .icon { font-size:44px; margin-bottom:14px; }
    .state-msg p { font-size:14px; line-height:1.6; }
    .state-msg strong { color:var(--text); }
    .loader { display:flex; gap:6px; align-items:center; justify-content:center; padding:40px; }
    .loader span { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:bounce 0.6s ease-in-out infinite; }
    .loader span:nth-child(2){animation-delay:0.1s} .loader span:nth-child(3){animation-delay:0.2s}
    @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
    #yt-player { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:14px; display:none; z-index:2; }
    #yt-player.visible { display:block; }
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
    .error-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--accent2); color:#fff; padding:12px 20px; border-radius:12px; font-size:13px; transition:transform 0.3s ease; z-index:999; white-space:nowrap; }
    .error-toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <img class="app-logo-img" id="appLogoImg" src="" alt="logo" />
      <div class="logo">Aİ<span>.</span>MÜZİK<span>.</span>FABRİKASI</div>
    </div>
    <div class="header-right">
      <!-- Language Dropdown -->
      <div class="lang-wrap">
        <div class="lang-btn" onclick="toggleLangMenu()" id="langBtn">
          <span class="flag" id="currentFlag">DE</span>
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" style="width:12px;height:12px;margin-left:2px"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-option" onclick="setLang('tr')"><span class="flag">TR</span> Türkçe</div>
          <div class="lang-option active" onclick="setLang('de')"><span class="flag">DE</span> Deutsch</div>
          <div class="lang-option" onclick="setLang('en')"><span class="flag">EN</span> English</div>
        </div>
      </div>
      <!-- Install Button -->
      <div class="icon-btn" id="installBtn" onclick="installApp()" style="display:none" title="App installieren">
        <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5z"/><path d="M20 18H4v2h16v-2z"/></svg>
      </div>
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()">
        <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </div>
      <!-- Settings -->
      <div class="icon-btn" onclick="toggleSetup()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>
  </header>

  <!-- SETUP PANEL -->
  <div class="setup-panel" id="setupPanel">
    <div>
      <label id="lblApiKey">YouTube API Key</label>
      <input type="password" id="apiKey" placeholder="AIza..." />
    </div>
    <div>
      <label id="lblChannel">Kanal-ID oder URL</label>
      <input type="text" id="channelId" placeholder="UCxxxxxxxx oder youtube.com/@kanal" />
    </div>
    <button class="load-btn" id="btnLoad" onclick="loadChannel()">LADEN</button>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="track-thumb">
      <div class="thumb-placeholder" id="thumbPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="1">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <img id="trackThumb" src="" style="display:none" />
      <div id="yt-player"></div>
      <div class="playing-indicator" id="playingIndicator">● LIVE</div>
    </div>
    <div class="track-info">
      <div class="track-title" id="trackTitle">-</div>
      <div class="track-channel" id="trackChannel" style="cursor:pointer" onclick="toggleSetup()"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">
        <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()">
        <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()">
        <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-header">
    <div class="playlist-title" id="lblPlaylist">PLAYLIST</div>
    <div class="track-count" id="trackCount"></div>
  </div>
  <div class="playlist" id="playlist">
    <div class="state-msg">
      <div class="icon">🎵</div>
      <p id="emptyMsg">Klick oben auf <strong>⚙</strong><br>API Key &amp; Kanal eingeben<br>und Musik laden.</p>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<!-- Turkish flag watermark -->
<div class="tr-flag-bg">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Crescent moon -->
    <circle cx="95" cy="100" r="70" fill="rgba(227,10,23,0.45)"/>
    <circle cx="118" cy="100" r="56" fill="var(--bg)"/>
    <!-- Star -->
    <g transform="translate(138,100) rotate(0)" fill="rgba(227,10,23,0.45)">
      <polygon points="0,-18 4.2,-5.8 17,-5.8 7,2.2 11,14 0,6.5 -11,14 -7,2.2 -17,-5.8 -4.2,-5.8"/>
    </g>
  </svg>
</div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // PWA Install
  let installPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    installPrompt = e;
    document.getElementById('installBtn').style.display = 'flex';
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBtn').style.display = 'none';
    installPrompt = null;
  });
  function installApp() {
    if (installPrompt) {
      installPrompt.prompt();
      installPrompt.userChoice.then(() => { installPrompt = null; });
    } else {
      showError('Safari: Teilen → Zum Homescreen');
    }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});

  let currentLang = localStorage.getItem('aimusic_lang') || 'de';
  const langFlags = { de: 'DE', en: 'EN', tr: 'TR' };
  const langNames = { de: 'DE', en: 'EN', tr: 'TR' };

  function applyLang(lang) {
    currentLang = lang;
    const t = i18n[lang];
    document.getElementById('lblApiKey').textContent = t.apiKey;
    document.getElementById('lblChannel').textContent = t.channel;
    document.getElementById('btnLoad').textContent = t.load;
    document.getElementById('lblPlaylist').textContent = t.playlist;
    document.getElementById('currentFlag').textContent = langFlags[lang];
    if (!tracks.length) {
      document.getElementById('trackTitle').textContent = t.noTrack;
      document.getElementById('trackChannel').textContent = t.configure;
      document.getElementById('emptyMsg').innerHTML = t.emptyMsg;
    }
    document.querySelectorAll('.lang-option').forEach((el, i) => {
      el.classList.toggle('active', ['de','en','tr'][i] === lang);
    });
    localStorage.setItem('aimusic_lang', lang);
  }

  function setLang(lang) {
    applyLang(lang);
    document.getElementById('langDropdown').classList.remove('open');
  }

  function toggleLangMenu() {
    document.getElementById('langDropdown').classList.toggle('open');
  }

  // Close dropdown on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.lang-wrap')) {
      document.getElementById('langDropdown').classList.remove('open');
    }
  });

  // Player state
  let player = null, tracks = [], currentIndex = 0;
  let isPlaying = false, isShuffle = false, isRepeat = false;
  let progressInterval = null, playerReady = false;

  // Theme
  const savedTheme = localStorage.getItem('aimusic_theme') || 'dark';
  if (savedTheme === 'light') applyLight();

  function applyLight() {
    document.documentElement.classList.add('light');
    document.getElementById('themeIcon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  function applyDark() {
    document.documentElement.classList.remove('light');
    document.getElementById('themeIcon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

  function toggleTheme() {
    const isLight = document.documentElement.classList.contains('light');
    if (isLight) { applyDark(); localStorage.setItem('aimusic_theme','dark'); }
    else { applyLight(); localStorage.setItem('aimusic_theme','light'); }
  }

  // Load saved config
  const saved = JSON.parse(localStorage.getItem('aimusic_cfg') || '{}');
  if (saved.apiKey) document.getElementById('apiKey').value = saved.apiKey;
  if (saved.channelId) document.getElementById('channelId').value = saved.channelId;

  // Apply saved language
  applyLang(currentLang);

  function toggleSetup() { document.getElementById('setupPanel').classList.toggle('open'); }

  function showError(msg) {
    const t = document.getElementById('errorToast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height:'1', width:'1',
      playerVars:{autoplay:0, controls:0, rel:0, modestbranding:1},
      events:{
        onReady: () => { playerReady = true; },
        onStateChange: onPlayerStateChange,
        onError: (e) => showError(i18n[currentLang].errVideo + ' (' + e.data + ')')
      }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      isPlaying = true; updatePlayIcon();
      document.getElementById('playingIndicator').classList.add('visible');
      startProgressUpdate();
    } else if (event.data === YT.PlayerState.PAUSED) {
      isPlaying = false; updatePlayIcon();
      document.getElementById('playingIndicator').classList.remove('visible');
      stopProgressUpdate();
    } else if (event.data === YT.PlayerState.ENDED) {
      document.getElementById('playingIndicator').classList.remove('visible');
      if (isRepeat) { player.seekTo(0); player.playVideo(); } else { nextTrack(); }
    }
  }

  async function loadChannel() {
    const apiKey = document.getElementById('apiKey').value.trim();
    let channelInput = document.getElementById('channelId').value.trim();
    const t = i18n[currentLang];
    if (!apiKey || !channelInput) { showError(t.errEnter); return; }
    localStorage.setItem('aimusic_cfg', JSON.stringify({apiKey, channelId: channelInput}));
    let channelId = channelInput;
    if (channelInput.includes('youtube.com/@')) {
      const handle = channelInput.split('@')[1].split('/')[0];
      channelId = await resolveHandle(handle, apiKey);
      if (!channelId) return;
    } else if (channelInput.includes('youtube.com/channel/')) {
      channelId = channelInput.split('/channel/')[1].split('/')[0];
    }
    document.getElementById('playlist').innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
    document.getElementById('setupPanel').classList.remove('open');
    await fetchVideos(channelId, apiKey);
  }

  async function resolveHandle(handle, apiKey) {
    try {
      const res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=' + handle + '&key=' + apiKey);
      const data = await res.json();
      if (data.items && data.items.length > 0) return data.items[0].id;
      showError(i18n[currentLang].errNotFound); return null;
    } catch { showError(i18n[currentLang].errNotFound); return null; }
  }

  async function fetchVideos(channelId, apiKey) {
    try {
      const chanRes = await fetch('https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=' + channelId + '&key=' + apiKey);
      const chanData = await chanRes.json();
      if (!chanData.items || chanData.items.length === 0) { showError(i18n[currentLang].errNotFound); return; }
      const uploadsId = chanData.items[0].contentDetails.relatedPlaylists.uploads;
      await fetchPlaylistItems(uploadsId, apiKey, '', []);
    } catch (e) { showError(i18n[currentLang].errApi + e.message); }
  }

  async function fetchPlaylistItems(playlistId, apiKey, pageToken, allItems) {
    try {
      const url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=' + playlistId + '&maxResults=50&key=' + apiKey + (pageToken ? '&pageToken=' + pageToken : '');
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) { showError(i18n[currentLang].errApi + data.error.message); return; }
      const items = [...allItems, ...(data.items || [])];
      if (data.nextPageToken && items.length < 200) {
        await fetchPlaylistItems(playlistId, apiKey, data.nextPageToken, items);
      } else { processVideos(items); }
    } catch (e) { showError(i18n[currentLang].errLoad + e.message); }
  }

  function processVideos(items) {
    tracks = items.filter(i => i.snippet.resourceId && i.snippet.resourceId.videoId).map(i => ({
      id: i.snippet.resourceId.videoId, title: i.snippet.title,
      channel: i.snippet.channelTitle,
      thumb: i.snippet.thumbnails?.medium?.url || i.snippet.thumbnails?.default?.url || ''
    }));
    if (tracks.length === 0) { showError(i18n[currentLang].errNoVideos); return; }
    document.getElementById('trackCount').textContent = tracks.length + ' Tracks';
    renderPlaylist(); loadTrack(0);
  }

  function renderPlaylist() {
    document.getElementById('playlist').innerHTML = tracks.map((t, i) => '<div class="track-item ' + (i === currentIndex ? 'active' : '') + '" onclick="loadTrack(' + i + ')" id="track-' + i + '"><div class="track-num">' + (i === currentIndex ? '▶' : i+1) + '</div><div class="track-item-thumb">' + (t.thumb ? '<img src="' + t.thumb + '" loading="lazy"/>' : '') + '</div><div class="track-item-info"><div class="track-item-title">' + t.title + '</div><div class="track-item-duration">' + t.channel + '</div></div></div>').join('');
  }

  function loadTrack(index) {
    if (!tracks.length || !playerReady) return;
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
      el.querySelector('.track-num').textContent = i === index ? '▶' : i+1;
    });
    currentIndex = index;
    const track = tracks[index];
    document.getElementById('trackTitle').textContent = track.title;
    document.getElementById('trackChannel').textContent = track.channel;
    if (track.thumb) {
      document.getElementById('trackThumb').src = track.thumb;
      document.getElementById('trackThumb').style.display = 'block';
      document.getElementById('thumbPlaceholder').style.display = 'none';
    } else {
      document.getElementById('trackThumb').style.display = 'none';
      document.getElementById('thumbPlaceholder').style.display = 'flex';
    }
    document.getElementById('trackThumb').style.display = 'none';
    document.getElementById('thumbPlaceholder').style.display = 'none';
    document.getElementById('yt-player').classList.add('visible');
    player.loadVideoById(track.id); isPlaying = true; updatePlayIcon();
    setTimeout(() => { const el = document.getElementById('track-'+index); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
  }

  function togglePlay() {
    if (!playerReady || !tracks.length) { toggleSetup(); return; }
    if (isPlaying) player.pauseVideo(); else player.playVideo();
  }
  function nextTrack() {
    if (!tracks.length) return;
    loadTrack(isShuffle ? Math.floor(Math.random()*tracks.length) : (currentIndex+1)%tracks.length);
  }
  function prevTrack() {
    if (!tracks.length) return;
    loadTrack((currentIndex-1+tracks.length)%tracks.length);
  }
  function toggleShuffle() { isShuffle=!isShuffle; document.getElementById('shuffleBtn').classList.toggle('ctrl-active',isShuffle); }
  function toggleRepeat() { isRepeat=!isRepeat; document.getElementById('repeatBtn').classList.toggle('ctrl-active',isRepeat); }
  function updatePlayIcon() {
    document.getElementById('playIcon').innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }
  function startProgressUpdate() {
    stopProgressUpdate();
    progressInterval = setInterval(() => {
      if (!player || !playerReady) return;
      const cur = player.getCurrentTime()||0, dur = player.getDuration()||0;
      if (dur > 0) {
        document.getElementById('progressFill').style.width = (cur/dur*100)+'%';
        document.getElementById('timeElapsed').textContent = formatTime(cur);
        document.getElementById('timeDuration').textContent = formatTime(dur);
      }
    }, 500);
  }
  function stopProgressUpdate() { if(progressInterval){clearInterval(progressInterval);progressInterval=null;} }
  function seekTo(e) {
    if (!playerReady || !tracks.length) return;
    player.seekTo((e.offsetX/e.currentTarget.offsetWidth)*(player.getDuration()||0),true);
  }
  function formatTime(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName==='INPUT') return;
    if (e.code==='Space'){e.preventDefault();togglePlay();}
    if (e.code==='ArrowRight') nextTrack();
    if (e.code==='ArrowLeft') prevTrack();
  });

  if (saved.apiKey && saved.channelId) {
    setTimeout(() => document.getElementById('setupPanel').classList.add('open'), 500);
  } else {
    setTimeout(() => toggleSetup(), 300);
  }
</script>
</body>
</html>
